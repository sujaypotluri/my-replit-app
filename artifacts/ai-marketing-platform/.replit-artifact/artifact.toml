kind = "web"
previewPath = "/"
title = "AI Marketing Platform"
version = "1.0.0"
id = "artifacts/ai-marketing-platform"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20854

[services.development]
run = "pnpm --filter @workspace/ai-marketing-platform run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/ai-marketing-platform", "run", "build" ]
publicDir = "artifacts/ai-marketing-platform/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20854"
BASE_PATH = "/"
